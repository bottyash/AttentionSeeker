      .c50{animation:heat 2.4s ease-in-out infinite;animation-delay:2.40s}
      .c51{animation:heat 2.4s ease-in-out infinite;animation-delay:2.48s}
      .c52{animation:heat 2.4s ease-in-out infinite;animation-delay:2.56s}
      .c53{animation:heat 2.4s ease-in-out infinite;animation-delay:2.64s}
      .c54{animation:heat 2.4s ease-in-out infinite;animation-delay:2.72s}
      .c55{animation:heat 2.4s ease-in-out infinite;animation-delay:2.80s}
      .lbl{font-family:'Segoe UI',Arial,sans-serif;font-size:9px;fill:#94a3b8;text-anchor:middle;}
      .ttl{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;font-weight:bold;fill:#e2e8f0;text-anchor:middle;}
    </style>
  </defs>
  <rect width="340" height="200" fill="#09080f" rx="12"/>
  <text class="ttl" x="170" y="22">Attention Heatmap</text>
  <text class="lbl" x="170" y="38">Layer 3 · Head 7 · 6 tokens</text>

  <!-- Token axis labels -->
  <text class="lbl" x="100" y="56">[CLS]</text>
  <text class="lbl" x="136" y="56">the</text>
  <text class="lbl" x="172" y="56">cat</text>
  <text class="lbl" x="208" y="56">sat</text>
  <text class="lbl" x="244" y="56">on</text>
  <text class="lbl" x="280" y="56">[SEP]</text>

