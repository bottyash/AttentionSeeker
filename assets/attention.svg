      .c25{animation:heat 2.4s ease-in-out infinite;animation-delay:1.36s}
      .c30{animation:heat 2.4s ease-in-out infinite;animation-delay:1.44s}
      .c31{animation:heat 2.4s ease-in-out infinite;animation-delay:1.52s}
      .c32{animation:heat 2.4s ease-in-out infinite;animation-delay:1.60s}
      .c33{animation:heat 2.4s ease-in-out infinite;animation-delay:1.68s}
      .c34{animation:heat 2.4s ease-in-out infinite;animation-delay:1.76s}
      .c35{animation:heat 2.4s ease-in-out infinite;animation-delay:1.84s}
      .c40{animation:heat 2.4s ease-in-out infinite;animation-delay:1.92s}
