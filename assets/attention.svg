      .c01{animation:heat 2.4s ease-in-out infinite;animation-delay:0.08s}
      .c02{animation:heat 2.4s ease-in-out infinite;animation-delay:0.16s}
      .c03{animation:heat 2.4s ease-in-out infinite;animation-delay:0.24s}
